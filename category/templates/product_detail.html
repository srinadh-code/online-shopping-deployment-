<!DOCTYPE html>
<html>
<head>
    <title>{{ product.name }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI;
        }

        body {
            background:#f4f6f9;
            padding:40px;
        }

        .container {
            max-width:1100px;
            margin:auto;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 8px 25px rgba(0,0,0,0.08);
            display:flex;
            gap:40px;
            flex-wrap:wrap;
        }

        .product-image {
            flex:1;
            min-width:300px;
        }

        .product-image img {
            width:100%;
            max-width:400px;
            border-radius:12px;
            transition:0.3s;
        }

        .product-image img:hover {
            transform:scale(1.05);
        }

        .product-info {
            flex:1;
            min-width:300px;
        }

        .product-info h1 {
            margin-bottom:15px;
            font-size:28px;
        }

        .price {
            font-size:24px;
            color:#4a90e2;
            font-weight:bold;
            margin:15px 0;
        }

        .description {
            margin:20px 0;
            line-height:1.6;
            color:#555;
        }

        .buttons {
            margin-top:25px;
            display:flex;
            gap:15px;
        }

        .btn {
            padding:12px 25px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-weight:600;
            transition:0.3s;
        }

        .btn-cart {
            background:#4a90e2;
            color:white;
        }

        .btn-cart:hover {
            background:#357bd8;
        }

        .btn-buy {
            background:#28a745;
            color:white;
        }

        .btn-buy:hover {
            background:#1e7e34;
        }

        .back-link {
            display:inline-block;
            margin-bottom:25px;
            color:#4a90e2;
            text-decoration:none;
            font-weight:500;
        }

        @media(max-width:768px){
            .container {
                flex-direction:column;
                text-align:center;
            }

            .product-image img {
                margin:auto;
            }

            .buttons {
                justify-content:center;
            }
        }
    </style>
</head>

<body>

<a href="{% url 'dashboard' %}" class="back-link">← Back to Dashboard</a>

<div class="container">

    <div class="product-image">
        <img src="{{ product.image.url }}" alt="{{ product.name }}">
    </div>

    <div class="product-info">
        <h1>{{ product.name }}</h1>

        <div class="price">₹{{ product.price }}</div>

        <div class="description">
            {{ product.description }}
        </div>

        <div class="buttons">
            <button class="btn btn-cart">Add to Cart</button>
            <button class="btn btn-buy">Buy Now</button>
        </div>
    </div>

</div>

</body>
</html>
