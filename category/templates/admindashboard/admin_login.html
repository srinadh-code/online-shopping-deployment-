<!DOCTYPE html>
<html>
<head>

<title>Admin Login</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:350px;
    background:white;
    padding:30px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:10px;
    background:#2c3e50;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#1a252f;
}

.error{
    color:red;
    text-align:center;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<form method="POST">

{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

{% if error %}
<p class="error">{{error}}</p>
{% endif %}

</div>

</body>
</html>
