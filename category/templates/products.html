<!DOCTYPE html>
<html>
<head>
    <title>{{ subcategory.name }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI; }

        body { display:flex; height:100vh; background:#f4f6f9; }

        .header {
            position:fixed;
            top:0; left:0; right:0;
            height:60px;
            background:#4a90e2;
            display:flex;
            align-items:center;
            padding:0 30px;
            color:white;
        }

        .sidebar {
            width:250px;
            background:white;
            margin-top:60px;
            padding:20px;
        }

        .category {
            padding:12px;
            background:#f1f3f6;
            border-radius:8px;
            margin-bottom:10px;
            font-weight:600;
        }

        .content {
            flex:1;
            margin-top:60px;
            padding:30px;
        }

        .products {
            display:flex;
            flex-wrap:wrap;
            gap:20px;
            margin-top:20px;
        }

        .product-card {
            width:200px;
            background:white;
            padding:10px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
            transition:0.3s;
        }

        .product-card:hover {
            transform:translateY(-5px);
        }

        .product-card img {
            width:100%;
            height:150px;
            object-fit:cover;
            border-radius:8px;
        }

        .price {
            color:#4a90e2;
            font-weight:bold;
        }

        a { text-decoration:none; color:inherit; }
    </style>
</head>

<body>

<div class="header">
    <div>Online Shopping</div>
</div>

<div class="sidebar">
    <h3>Categories</h3>

    {% for cat in categories %}
        <a href="{% url 'category' cat.id %}">
            <div class="category">{{ cat.name }}</div>
        </a>
    {% endfor %}
</div>

<div class="content">
    <h2>{{ subcategory.name }}</h2>

    <div class="products">
        {% for product in products %}
        <div class="product-card">
            <img src="{{ product.image.url }}">
            <h4>{{ product.name }}</h4>
            <p class="price">₹{{ product.price }}</p>
        </div>
        {% empty %}
            <p>No products available</p>
        {% endfor %}
    </div>
</div>

</body>
</html>
