{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
   
         body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background:
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
        url("{% static 'images/hh.webp' %}") no-repeat center center;
    background-size: cover;
    font-family: sans-serif;
}


           .card {
            width: 360px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            text-align: center;
            color: white;
        }

        h2 {
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 25px;
            border: none;
            outline: none;
            background: #f4f6fb;
            box-shadow: inset 6px 6px 12px rgba(0,0,0,0.08),
                        inset -6px -6px 12px rgba(255,255,255,0.9);
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(135deg, #2c7be5, #1fc8db);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        .error {
            color: red;
            margin-top: 10px;
        }

        .back {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            color: #1e90ff;
            font-size: 14px;
        }

    </style>
</head>
<body>

<div class="card">

    <h2>Forgot Password</h2>

    <form method="POST">
        {% csrf_token %}
        <input type="email" name="email" placeholder="Enter your email">
        <button type="submit">Send OTP</button>
    </form>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <a href="{% url 'login' %}" class="back">Back to Login</a>

</div>

</body>
</html>
