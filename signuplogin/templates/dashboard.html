<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ================= RESET ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f1f3f6;
}


/* ================= HEADER ================= */

.header{

position:fixed;
top:0;
left:0;
right:0;

height:70px;

background:#2874f0;
color:white;

display:flex;
align-items:center;
justify-content:space-between;

padding:0 30px;

z-index:1000;
}

.logo{
font-size:20px;
font-weight:bold;
}

.search-bar input{

width:400px;
padding:10px;
border:none;
border-radius:4px;
outline:none;

}

.header-right{

display:flex;
align-items:center;
gap:20px;
}

.header-right a{

color:white;
text-decoration:none;
font-weight:bold;

padding:6px 10px;
border-radius:5px;
}

.header-right a:hover{

background:rgba(255,255,255,0.2);
}


/* ================= LAYOUT ================= */

.wrapper{

display:flex;
margin-top:70px;

}


/* ================= SIDEBAR ================= */

.sidebar{

width:260px;
background:white;

padding:15px;

border-right:1px solid #ddd;

}

.category-btn{

display:flex;
justify-content:space-between;
align-items:center;

padding:12px;

cursor:pointer;

border-radius:6px;
}

.category-btn:hover{

background:#f5f7fa;

}

.arrow{

transition:0.3s;

}

.category-btn.active .arrow{

transform:rotate(90deg);

}

.subcategory{

max-height:0;
overflow:hidden;

transition:max-height 0.3s ease;

padding-left:15px;
}

.subcategory a{

display:block;

padding:8px;

text-decoration:none;

color:#333;

border-radius:5px;
}

.subcategory a:hover{

background:#f1f3f6;

}


/* ================= MAIN ================= */

.main{

flex:1;
padding:20px;

}


/* ================= SECTION ================= */

.section{

background:white;

padding:20px;

margin-bottom:20px;

border-radius:8px;

box-shadow:0 2px 6px rgba(0,0,0,0.1);

}

.section h2{

margin-bottom:15px;

}


/* ================= JUST ARRIVED ================= */

#justContainer{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:15px;

}


/* ================= BOTTOM SECTION ================= */

.bottom-row{

display:flex;

gap:20px;

}

.bottom-row .section{

flex:1;

}

#recentContainer,
#recommendedContainer{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:15px;

}


/* ================= CARD ================= */

.card{

background:white;

padding:10px;

border-radius:8px;

text-align:center;

box-shadow:0 2px 6px rgba(0,0,0,0.1);

transition:0.3s;

}

.card:hover{

transform:translateY(-5px);

}

.card img{

width:100%;
height:140px;

object-fit:contain;

}

.price{

color:#2ecc71;
font-weight:bold;

}

</style>

</head>

<body>


<!-- ================= HEADER ================= -->

<div class="header">

<div class="logo">
Online Shopping
</div>

<form method="GET" action="{% url 'dashboard' %}" class="search-bar">

<input type="text" name="q" placeholder="Search products">

</form>

<div class="header-right">

<a href="{% url 'wishlist' %}">
❤️ Wishlist ({{ wishlist_count }})
</a>

<a href="{% url 'cart' %}">
🛒 Cart
</a>

<span>
Welcome {{ username }}
</span>

</div>

</div>



<!-- ================= BODY ================= -->

<div class="wrapper">


<!-- ================= SIDEBAR ================= -->

<div class="sidebar">

<h3>Categories</h3>

{% for category in categories %}

<div class="category-btn">

<span>{{ category.name }}</span>

<span class="arrow">▶</span>

</div>

<div class="subcategory">

{% for sub in category.subcategories.all %}

<a href="{% url 'subcategory' sub.id %}">
{{ sub.name }}
</a>

{% endfor %}

</div>

{% endfor %}

</div>



<!-- ================= MAIN CONTENT ================= -->

<div class="main">


<!-- JUST ARRIVED -->

<div class="section">

<h2>Just Arrived</h2>

<div id="justContainer"></div>

</div>



<!-- RECENT + RECOMMENDED -->

<div class="bottom-row">


<div class="section">

<h2>Recently Viewed</h2>

<div id="recentContainer"></div>

</div>


<div class="section">

<h2>Recommended</h2>

<div id="recommendedContainer"></div>

</div>


</div>


</div>


</div>



<!-- ================= JAVASCRIPT ================= -->

<script>

/* CATEGORY TOGGLE */

const buttons=document.querySelectorAll(".category-btn");

buttons.forEach((btn,index)=>{

btn.onclick=()=>{

const subs=document.querySelectorAll(".subcategory");

const isOpen=subs[index].style.maxHeight;

subs.forEach(sub=>sub.style.maxHeight=null);

buttons.forEach(b=>b.classList.remove("active"));

if(!isOpen){

subs[index].style.maxHeight=subs[index].scrollHeight+"px";

btn.classList.add("active");

}

};

});


/* DATA FROM DJANGO */

let justData=[

{% for p in just_arrived %}
{id:"{{p.id}}",name:"{{p.name}}",price:"{{p.price}}",image:"{{p.image.url}}"},
{% endfor %}

];

let recentData=[

{% for p in recently_viewed %}
{id:"{{p.id}}",name:"{{p.name}}",price:"{{p.price}}",image:"{{p.image.url}}"},
{% endfor %}

];

let recommendedData=[

{% for p in recommended %}
{id:"{{p.id}}",name:"{{p.name}}",price:"{{p.price}}",image:"{{p.image.url}}"},
{% endfor %}

];


/* RENDER FUNCTION */

function render(container,data,start,count){

if(data.length===0){

container.innerHTML="No products";

return;

}

container.innerHTML="";

for(let i=0;i<count;i++){

let p=data[(start+i)%data.length];

container.innerHTML+=`

<div class="card">

<a href="/product/${p.id}/">

<img src="${p.image}">

</a>

<p>${p.name}</p>

<p class="price">₹${p.price}</p>

</div>

`;

}

}


/* INITIAL */

render(justContainer,justData,0,4);

render(recentContainer,recentData,0,4);

render(recommendedContainer,recommendedData,0,4);


/* AUTO ROTATE */

let j=0;

setInterval(()=>{

j++;

render(justContainer,justData,j,4);

},3000);


let r=0;

setInterval(()=>{

r++;

render(recommendedContainer,recommendedData,r,4);

},3000);


</script>


</body>
</html>
