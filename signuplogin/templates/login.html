{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
       

        {% comment %} body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4e1d75, #7b2cbf, #9d4edd);
        } {% endcomment %}
                 body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background:
        linear-gradient(rgba(29, 27, 27, 0.5), rgba(35, 33, 33, 0.5)),
        url("{% static 'images/bg.jpg' %}") no-repeat center center;
    background-size: cover;
    font-family: sans-serif;
}

        .card {
            width: 360px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            text-align: center;
            color: white;
        }

        .card h2 {
            margin-bottom: 30px;
            font-weight: 600;
        }

        .input-box {
            margin-bottom: 20px;
        }

        .input-box input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 25px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 14px;
        }

        .input-box input::placeholder {
            color: #ddd;
        }

        .options {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .options label {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .options a {
            color: white;
            text-decoration: none;
        }

        .options a:hover {
            text-decoration: underline;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: none;
            background: white;
            color: #6a11cb;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background: #eee;
        }

        .register {
            margin-top: 20px;
            font-size: 14px;
        }

        .register a {
            color: red;
            font-weight: bold;
            text-decoration: none;
        }

        .error {
            margin-top: 15px;
            color: #ff6b6b;
        }

        .success {
            margin-top: 15px;
            color: #e92428;
        }

        @media(max-width: 400px){
            .card{
                width: 90%;
                padding: 30px;
            }
        }

    </style>
</head>
<body>

<div class="card">

    <h2>Login</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="input-box">
            <input type="text" name="username_or_email" placeholder="Username or Email">
        </div>

        <div class="input-box">
            <input type="password" name="password" placeholder="Password">
        </div>

        <div class="options">
            <label>
                <input type="checkbox"> Remember me
            </label>
            <a href="{% url 'forgot_password' %}">Forgot password?</a>
        </div>

        <button type="submit">Login</button>
    </form>

    <div class="register">
        Don't have an account? 
        <a href="{% url 'signup' %}">Register</a>
    </div>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    {% if message %}
        <p class="success">{{ message }}</p>
    {% endif %}

</div>

</body>
</html>
